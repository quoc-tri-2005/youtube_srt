<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Ghép SRT</title>
    <link rel="stylesheet" href="merge.css">
</head>

<body>

    <a href="index.html" class="back-btn">⬅ Quay về</a>

    <h1>Ghép phụ đề SRT</h1>

    <div class="container">
        <textarea id="original" placeholder="Phụ đề gốc"></textarea>

        <textarea id="translated" placeholder="Phụ đề dịch"></textarea>
    </div>

    <div class="options">

        <label>
            <input
                type="checkbox"
                id="enableWrap"
                checked
            >
            Tự động xuống dòng
        </label>

        <input
            type="number"
            id="maxLen"
            value="32"
            min="10"
            max="100"
            placeholder="Số ký tự"
        >

    </div>

    <button onclick="merge()">
        Ghép
    </button>

    <textarea
        id="result"
        placeholder="Kết quả"
    ></textarea>

    <script src="merge.js"></script>

</body>

</html>
